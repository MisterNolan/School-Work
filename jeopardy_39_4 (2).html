<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G7 Lit Jeopardy – 39.4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');

  :root {
    --navy: #0a1628;
    --gold: #f5c518;
    --gold-dark: #c49a10;
    --blue: #1a3a6b;
    --blue-light: #2255a4;
    --card-bg: #1a3a6b;
    --card-hover: #2255a4;
    --correct: #1a7a3f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: #fff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCOREBOARD */
  #scoreboard {
    background: #060e1c;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 3px solid var(--gold);
  }

  #scoreboard h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--gold);
    letter-spacing: 2px;
    margin-right: auto;
  }

  #teams-container {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .team-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--blue);
    border: 2px solid var(--gold);
    border-radius: 8px;
    padding: 6px 14px;
    min-width: 120px;
  }

  .team-name {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold);
  }

  .team-points {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    line-height: 1;
    color: #fff;
    cursor: pointer;
    border-bottom: 1px dashed rgba(255,255,255,0.2);
    text-align: center;
  }
  .team-points:hover { border-color: var(--gold); color: var(--gold); }

  .team-btn-row {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }

  .team-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 0.7rem;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .team-btn:hover { background: rgba(255,255,255,0.1); }
  .team-btn.add { border-color: var(--gold); color: var(--gold); }
  .team-btn.sub { border-color: #f55; color: #f55; }
  .team-btn.edit { border-color: #88aaff; color: #88aaff; }

  /* BOARD */
  #board-wrap { padding: 16px; }

  #board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .cat-header {
    background: var(--gold);
    color: var(--navy);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 1px;
    text-align: center;
    padding: 14px 8px;
    border-radius: 6px;
    line-height: 1.2;
  }

  .card {
    background: var(--card-bg);
    border: 2px solid var(--blue-light);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    aspect-ratio: 4/3;
    transition: background 0.15s, transform 0.1s;
  }

  .card:hover:not(.used) {
    background: var(--card-hover);
    transform: translateY(-2px);
    border-color: var(--gold);
  }

  .card.used {
    background: #0a1628;
    border-color: #1a2a40;
    cursor: default;
  }

  .card-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    color: var(--gold);
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  .card.used .card-value { opacity: 0; }

  /* MODAL */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }

  #modal {
    background: var(--navy);
    border: 3px solid var(--gold);
    border-radius: 14px;
    max-width: 680px;
    width: 92%;
    padding: 36px 40px;
    text-align: center;
  }

  #modal-category {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 6px;
  }

  #modal-points {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 20px;
  }

  #modal-question {
    font-size: 1.3rem;
    line-height: 1.55;
    font-weight: 600;
    color: #fff;
    margin-bottom: 28px;
  }

  #show-answer-btn {
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    padding: 12px 32px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #show-answer-btn:hover { background: var(--gold-dark); }

  #modal-answer {
    display: none;
    margin-top: 20px;
    background: #0f1f3d;
    border-radius: 8px;
    padding: 16px 20px;
    font-size: 1.1rem;
    color: #a8d8a8;
    font-weight: 600;
  }
  #modal-answer.visible { display: block; }

  #modal-actions {
    display: none;
    margin-top: 20px;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  #modal-actions.visible { display: flex; }

  .award-btn {
    background: var(--blue);
    border: 2px solid var(--gold);
    color: var(--gold);
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .award-btn:hover { background: var(--blue-light); }

  #close-modal {
    margin-top: 18px;
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.6);
    border-radius: 6px;
    padding: 7px 20px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  #close-modal:hover { border-color: #fff; color: #fff; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--correct);
    color: #fff;
    font-weight: 700;
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 1rem;
    transition: transform 0.3s;
    z-index: 200;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 700px) {
    .cat-header { font-size: 0.7rem; padding: 8px 4px; }
    .card-value { font-size: 1.4rem; }
    #modal { padding: 24px 20px; }
    #modal-question { font-size: 1rem; }
  }

  /* EDIT SCORE MODAL */
  #edit-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #edit-overlay.open { display: flex; }
  #edit-modal {
    background: var(--navy);
    border: 3px solid #88aaff;
    border-radius: 14px;
    padding: 36px 44px;
    text-align: center;
    min-width: 300px;
  }
  #edit-modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: #88aaff;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  #edit-team-label { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
  #edit-score-input {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    background: #0f1f3d;
    border: 2px solid #88aaff;
    border-radius: 8px;
    color: #fff;
    text-align: center;
    width: 160px;
    padding: 8px;
    outline: none;
  }
  #edit-modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 22px; }
  .edit-confirm {
    background: #88aaff;
    color: var(--navy);
    border: none;
    border-radius: 8px;
    padding: 10px 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    cursor: pointer;
  }
  .edit-confirm:hover { background: #aabbff; }
  .edit-cancel {
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.6);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .edit-cancel:hover { border-color: #fff; color: #fff; }
</style>
</head>
<body>

<div id="scoreboard">
  <h1>G7 Lit Jeopardy — 39.4</h1>
  <div id="teams-container"></div>
</div>

<div id="board-wrap">
  <div id="board"></div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <div id="modal-category"></div>
    <div id="modal-points"></div>
    <div id="modal-question"></div>
    <button id="show-answer-btn">Reveal Answer</button>
    <div id="modal-answer"></div>
    <div id="modal-actions"></div>
    <br>
    <button id="close-modal">✕ Close &amp; mark used</button>
  </div>
</div>


<!-- EDIT SCORE MODAL -->
<div id="edit-overlay">
  <div id="edit-modal">
    <h2>Edit Score</h2>
    <div id="edit-team-label"></div>
    <input id="edit-score-input" type="number" min="0" />
    <div id="edit-modal-btns">
      <button class="edit-confirm" id="edit-confirm-btn">Set Score</button>
      <button class="edit-cancel" id="edit-cancel-btn">Cancel</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const categories = [
  "Orpheus & Eurydice",
  "Young Arthur",
  "Vocab 1",
  "Vocab 2",
  "Mr. Nolan Facts"
];

const questions = [
  // ── ORPHEUS & EURYDICE ──
  [
    { q: "How does Eurydice die at the beginning of the story?", a: "She is bitten by a snake on her wedding day while gathering flowers with her maidens by the riverside." },
    { q: "What does Orpheus use to charm his way into the underworld, and what effect does it have on the monsters guarding it?", a: "He plays his lyre and sings. Charon the ferryman forgets to charge him, and Cerberus the three-headed dog stops still and listens." },
    { q: "What is the one condition Hades gives Orpheus for taking Eurydice back to the living world?", a: "He must never look back at Eurydice as he climbs out of the underworld. If he turns around, she will return to Hades." },
    { q: "Why does Orpheus turn around before he reaches the surface? What happens when he does?", a: "He can hear nothing behind him and fears Hades has tricked him. He turns and sees Eurydice's dim shade — she dissolves like smoke and whispers 'Farewell,' and is gone." },
    { q: "How does the story of Orpheus and Eurydice end? Where do they ultimately meet again?", a: "Orpheus is killed by the women of Thrace. His spirit descends to the underworld where he is reunited with Eurydice in the daffodil meadows — and now he is allowed to look back at her." }
  ],
  // ── YOUNG ARTHUR ──
  [
    { q: "Why does Merlin take the infant Arthur away from his father King Uther?", a: "Uther has enemies even at court. Merlin warns that unrest is growing and the baby's life is in danger, so Uther agrees to give the child into Merlin's keeping for safety." },
    { q: "Who raises Arthur, and what is his relationship to Kay?", a: "Arthur is raised by Sir Ector and his wife. Kay is Arthur's older foster brother, recently knighted, who becomes Arthur's harsh taskmaster." },
    { q: "Why does Arthur pull the sword from the stone? Does he realise its significance at the time?", a: "He pulls it to replace Kay's forgotten sword for the tournament. No — he does not notice the golden words on the blade and has no idea it is the sword of the stone." },
    { q: "What does Kay do when Arthur brings him the sword, and what does this reveal about his character?", a: "Kay claims he pulled the sword himself and tries to take credit for it. This reveals he is vain and dishonest, willing to lie even to his own father." },
    { q: "What does Arthur do when he realises the crowd thinks he has stolen a king's sword? What does this show about his character?", a: "He rides back to confess, even though he is frightened. He says 'A true knight would not run away, and I am a true knight in my heart' — showing his honesty and courage." }
  ],
  // ── VOCAB 1: lichens / vengeance / aptitude / melancholy / ruffling ──
  [
    { q: "What does LICHENS mean?", a: "Fungi that grow together with algae and form crusty growths on rocks or tree trunks — a type of plant-like organism found in nature." },
    { q: "What does VENGEANCE mean?", a: "Punishment or harm done to someone in return for a wrong they have done — getting revenge." },
    { q: "What does APTITUDE mean?", a: "A natural ability or talent for something — being naturally good at a skill without needing much practice." },
    { q: "What does MELANCHOLY mean?", a: "A deep feeling of sadness or depression — a long-lasting low mood, often without a clear cause." },
    { q: "What does RUFFLING mean?", a: "Disturbing or moving the surface of something lightly — like the wind ruffling feathers or leaves, causing them to move in a disordered way." }
  ],
  // ── VOCAB 2: supernatural / inconsolable / exaggeration / lyre / taskmaster ──
  [
    { q: "What does SUPERNATURAL mean?", a: "Beyond what is natural or explainable by science — relating to magic, gods, or forces that ordinary humans cannot have or understand." },
    { q: "What does INCONSOLABLE mean?", a: "So sad or upset that nothing can comfort you — impossible to cheer up or make feel better." },
    { q: "What does EXAGGERATION mean?", a: "Describing something as much bigger, better, worse, or more extreme than it really is — overstating something for effect." },
    { q: "What does LYRE mean?", a: "An ancient stringed instrument resembling a small harp — the instrument Orpheus plays in the myth." },
    { q: "What does TASKMASTER mean?", a: "A person who gives others difficult tasks and makes sure they are done — someone who is a strict or demanding supervisor." }
  ],
  // ── MR. NOLAN FACTS ──
  [
    { q: "What country was Mr. Nolan born in?", a: "TBC" },
    { q: "Where did Mr. Nolan get married?", a: "TBC" },
    { q: "What pet does Mr. Nolan want?", a: "TBC" },
    { q: "How many siblings does Mr. Nolan have?", a: "TBC" },
    { q: "What three countries is Mr. Nolan visiting this summer?", a: "TBC" }
  ]
];

const pointValues = [100, 200, 300, 400, 500];
let teams = Array.from({length: 5}, (_, i) => ({ name: `Team ${i+1}`, points: 0 }));
let currentCard = null;
let usedCards = new Set();

function buildScoreboard() {
  const container = document.getElementById('teams-container');
  container.innerHTML = '';
  teams.forEach((team, i) => {
    const div = document.createElement('div');
    div.className = 'team-score';
    div.innerHTML = `
      <div class="team-name">${team.name}</div>
      <div class="team-points" id="pts-${i}">${team.points}</div>
      <div class="team-btn-row">
        <button class="team-btn sub" onclick="adjustScore(${i}, -1)">−</button>
        <button class="team-btn add" onclick="awardTeam(${i})">+</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  categories.forEach(cat => {
    const h = document.createElement('div');
    h.className = 'cat-header';
    h.textContent = cat;
    board.appendChild(h);
  });

  pointValues.forEach((pts, qIdx) => {
    categories.forEach((cat, catIdx) => {
      const key = `${catIdx}-${qIdx}`;
      const card = document.createElement('div');
      card.className = 'card' + (usedCards.has(key) ? ' used' : '');
      card.id = `card-${key}`;
      card.innerHTML = `<span class="card-value">$${pts}</span>`;
      if (!usedCards.has(key)) {
        card.addEventListener('click', () => openModal(catIdx, qIdx));
      }
      board.appendChild(card);
    });
  });
}

function openModal(catIdx, qIdx) {
  currentCard = {catIdx, qIdx};
  const q = questions[catIdx][qIdx];
  const pts = pointValues[qIdx];

  document.getElementById('modal-category').textContent = categories[catIdx];
  document.getElementById('modal-points').textContent = `$${pts}`;
  document.getElementById('modal-question').textContent = q.q;
  document.getElementById('modal-answer').textContent = `✓ ${q.a}`;
  document.getElementById('modal-answer').classList.remove('visible');
  document.getElementById('show-answer-btn').style.display = 'inline-block';

  const actions = document.getElementById('modal-actions');
  actions.classList.remove('visible');
  actions.innerHTML = '';
  teams.forEach((team, i) => {
    const btn = document.createElement('button');
    btn.className = 'award-btn';
    btn.textContent = `+${pts} → ${team.name}`;
    btn.onclick = () => { awardTeam(i); closeModal(); };
    actions.appendChild(btn);
  });

  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('show-answer-btn').addEventListener('click', () => {
  document.getElementById('modal-answer').classList.add('visible');
  document.getElementById('modal-actions').classList.add('visible');
  document.getElementById('show-answer-btn').style.display = 'none';
});

document.getElementById('close-modal').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

function closeModal() {
  if (currentCard) {
    const key = `${currentCard.catIdx}-${currentCard.qIdx}`;
    usedCards.add(key);
    const cardEl = document.getElementById(`card-${key}`);
    if (cardEl) {
      const newCard = cardEl.cloneNode(true);
      newCard.classList.add('used');
      cardEl.replaceWith(newCard);
    }
  }
  document.getElementById('modal-overlay').classList.remove('open');
  currentCard = null;
}

function awardTeam(teamIdx) {
  if (!currentCard) return;
  const pts = pointValues[currentCard.qIdx];
  teams[teamIdx].points += pts;
  updateScore(teamIdx);
  showToast(`+${pts} → ${teams[teamIdx].name}!`);
}

function adjustScore(teamIdx) {
  const pts = currentCard ? pointValues[currentCard.qIdx] : 100;
  teams[teamIdx].points = Math.max(0, teams[teamIdx].points - pts);
  updateScore(teamIdx);
}

let editingTeamIdx = null;

function openEditModal(teamIdx) {
  editingTeamIdx = teamIdx;
  document.getElementById('edit-team-label').textContent = teams[teamIdx].name;
  document.getElementById('edit-score-input').value = teams[teamIdx].points;
  document.getElementById('edit-overlay').classList.add('open');
  setTimeout(() => {
    const inp = document.getElementById('edit-score-input');
    inp.focus(); inp.select();
  }, 50);
}

document.getElementById('edit-confirm-btn').addEventListener('click', () => {
  const val = parseInt(document.getElementById('edit-score-input').value, 10);
  if (!isNaN(val) && val >= 0 && editingTeamIdx !== null) {
    teams[editingTeamIdx].points = val;
    updateScore(editingTeamIdx);
    showToast(teams[editingTeamIdx].name + ' -> ' + val + ' pts');
  }
  closeEditModal();
});

document.getElementById('edit-cancel-btn').addEventListener('click', closeEditModal);

document.getElementById('edit-score-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('edit-confirm-btn').click();
  if (e.key === 'Escape') closeEditModal();
});

document.getElementById('edit-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('edit-overlay')) closeEditModal();
});

function closeEditModal() {
  document.getElementById('edit-overlay').classList.remove('open');
  editingTeamIdx = null;
}

function updateScore(teamIdx) {
  const el = document.getElementById(`pts-${teamIdx}`);
  if (el) el.textContent = teams[teamIdx].points;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

buildScoreboard();
buildBoard();
</script>
</body>
</html>
