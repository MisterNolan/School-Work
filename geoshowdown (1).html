<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoShowdown</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 1.5rem; }
  #app { max-width: 780px; margin: 0 auto; }
  h1.game-title { font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 1.5rem; text-align: center; }
  .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; margin-bottom: 1.25rem; align-items: center; }
  .team-card { border: 1px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; background: #fff; text-align: center; }
  .team-card.active { border: 2px solid #2563eb; }
  .team-card.steal  { border: 2px solid #d97706; }
  .team-name  { font-size: 12px; color: #888; margin-bottom: 4px; }
  .team-score { font-size: 40px; font-weight: 600; }
  .team-a .team-score { color: #2563eb; }
  .team-b .team-score { color: #16a34a; }
  .team-badge { font-size: 11px; margin-top: 4px; height: 16px; font-weight: 500; }
  .team-a .team-badge { color: #2563eb; }
  .team-b .team-badge { color: #16a34a; }
  .steal-badge { color: #d97706; }
  .vs { font-size: 22px; color: #bbb; text-align: center; font-weight: 500; }
  .status-bar { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 10px 16px; font-size: 13px; color: #666; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .status-turn { font-weight: 600; color: #1a1a1a; }
  .q-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .q-meta { font-size: 12px; color: #aaa; margin-bottom: 10px; }
  .q-text { font-size: 18px; font-weight: 600; line-height: 1.5; color: #111; }
  .answer-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .answer-label { font-size: 11px; font-weight: 600; color: #16a34a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .answer-text  { font-size: 15px; color: #166534; line-height: 1.5; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .phase-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; margin-bottom: 8px; }
  button { padding: 9px 18px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  button:hover   { background: #f5f5f3; }
  button:active  { transform: scale(0.98); }
  button.correct { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
  button.wrong   { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  button.next    { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  button.reset   { background: #1a1a1a; color: #fff; border-color: #1a1a1a; padding: 12px 28px; font-size: 15px; }
  .progress-bar { background: #e5e5e5; border-radius: 4px; height: 4px; margin-bottom: 1.25rem; }
  .progress-fill { background: #2563eb; height: 4px; border-radius: 4px; }
  .end-screen { text-align: center; padding: 3rem 1rem; }
  .winner-text { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
  .final-scores { font-size: 16px; color: #666; margin-bottom: 2rem; }
</style>
</head>
<body>
<div id="app">
  <h1 class="game-title">GeoShowdown — Units 5 &amp; 6</h1>
  <div id="main"></div>
</div>
<script>
const questions = [
  { unit: 5, q: "What does 'quality of life' mean?", a: "A person's overall well-being and satisfaction with daily life, including health, education, safety, and access to resources." },
  { unit: 5, q: "What is the difference between a need and a want?", a: "A need is essential for survival (food, shelter, water). A want is desired but not required to survive." },
  { unit: 5, q: "Name THREE quality of life indicators.", a: "Any three: literacy rate, life expectancy, access to safe water, income, education level, access to healthcare." },
  { unit: 5, q: "What does life expectancy measure?", a: "The average number of years a person born today is expected to live." },
  { unit: 5, q: "What are Blue Zones?", a: "Regions where people live significantly longer than average, linked to healthy lifestyle and strong community habits." },
  { unit: 5, q: "What does HDI stand for and what does it measure?", a: "Human Development Index — combines life expectancy, education, and income to compare quality of life between countries." },
  { unit: 5, q: "What are the three components of the HDI?", a: "Life expectancy, education (literacy and school enrolment), and income (GNI per capita)." },
  { unit: 5, q: "What is the difference between an indicator and an index?", a: "An indicator measures one factor; an index combines multiple indicators into a single score." },
  { unit: 5, q: "What does a positive relationship on a scatter graph mean?", a: "As one variable increases, the other also increases — they move in the same direction." },
  { unit: 5, q: "Give one reason why quality of life inequalities persist.", a: "Any valid answer: gender inequality, environmental damage, rural-urban gaps, poor governance, limited education access." },
  { unit: 5, q: "How can environmental damage reduce quality of life?", a: "It can harm health, contaminate water, reduce food production, and damage living conditions." },
  { unit: 5, q: "What is the difference between equality and inequality?", a: "Equality means everyone has equal access to resources; inequality means some groups have significantly more than others." },
  { unit: 5, q: "What does a random pattern on a scatter graph show?", a: "There is no clear relationship between the two variables." },
  { unit: 5, q: "Why do geographers use multiple indicators rather than just one?", a: "One indicator cannot capture the full picture — combining them gives a more complete and accurate view." },
  { unit: 5, q: "Give an example of a country with a high HDI and explain why.", a: "E.g. Canada, Norway, Switzerland — high life expectancy, strong education systems, and high income per person." },
  { unit: 6, q: "What is GDP?", a: "Gross Domestic Product — the total value of all goods and services produced in a country in one year." },
  { unit: 6, q: "What is GDP per capita, and why is it more useful than total GDP?", a: "GDP divided by population — shows average wealth per person, making country comparisons fairer." },
  { unit: 6, q: "Give ONE limitation of using GDP per capita to measure quality of life.", a: "It does not show how wealth is distributed — a country can have high GDP per capita but still have extreme inequality." },
  { unit: 6, q: "Name TWO geographic factors that affect a country's wealth.", a: "Any two: natural resources, location or access to trade routes, climate, coastal access, fertile land." },
  { unit: 6, q: "What are human resources?", a: "The skills, education, training, and labour that people contribute to an economy." },
  { unit: 6, q: "How does education improve a country's economy?", a: "It develops a skilled workforce, raises productivity, attracts investment, and enables innovation." },
  { unit: 6, q: "What is a market economy?", a: "An economic system where prices and production are determined by supply and demand, with little government control." },
  { unit: 6, q: "What is a command economy?", a: "An economic system where the government controls what is produced, how it is produced, and the prices." },
  { unit: 6, q: "What is a mixed economy?", a: "A system combining market and command features — some government control alongside private enterprise." },
  { unit: 6, q: "Name the four economic sectors in order.", a: "Primary (extract), Secondary (manufacture), Tertiary (services), Quaternary (knowledge and research)." },
  { unit: 6, q: "Give an example of a primary sector job.", a: "Any of: farming, fishing, mining, forestry, oil extraction." },
  { unit: 6, q: "How do employment patterns change as a country develops?", a: "Workers shift from primary to secondary, and eventually to tertiary and quaternary sectors." },
  { unit: 6, q: "What is fair trade?", a: "A system ensuring producers in developing countries receive a fair price and safe working conditions." },
  { unit: 6, q: "What is outsourcing?", a: "When a company hires workers or moves production to another country, usually to reduce labour costs." },
  { unit: 6, q: "Name one benefit AND one drawback of global trade.", a: "Benefit: economic growth, access to goods, jobs. Drawback: unequal profits, worker exploitation, environmental costs." },
];

let scores = { A: 0, B: 0 };
let currentTeam = 'A';
let currentQ = 0;
let phase = 'judge';
let stealActive = false;

function other(t) { return t === 'A' ? 'B' : 'A'; }

function render() {
  const el = document.getElementById('main');
  if (currentQ >= questions.length) { renderEnd(el); return; }

  const q = questions[currentQ];
  const pct = Math.round((currentQ / questions.length) * 100);
  const answeringTeam = stealActive ? other(currentTeam) : currentTeam;
  const teamAClass = answeringTeam === 'A' ? (stealActive ? 'steal' : 'active') : '';
  const teamBClass = answeringTeam === 'B' ? (stealActive ? 'steal' : 'active') : '';
  const teamABadge = answeringTeam === 'A' ? (stealActive ? '<span class="steal-badge">steal!</span>' : 'answering') : '&nbsp;';
  const teamBBadge = answeringTeam === 'B' ? (stealActive ? '<span class="steal-badge">steal!</span>' : 'answering') : '&nbsp;';

  let statusMsg = '';
  let controls = '';

  if (phase === 'judge') {
    statusMsg = 'Team ' + currentTeam + ' answers out loud — then judge';
    controls =
      '<div class="phase-label">Judge Team ' + currentTeam + '\'s answer — answer not shown yet</div>' +
      '<div class="btn-row">' +
        '<button class="correct" onclick="awardPoint(\'' + currentTeam + '\')">Correct — +1 Team ' + currentTeam + '</button>' +
        '<button class="wrong" onclick="markWrong()">Wrong — give steal chance</button>' +
      '</div>';
  } else if (phase === 'steal') {
    statusMsg = 'Team ' + other(currentTeam) + ' — steal opportunity!';
    controls =
      '<div class="phase-label">Judge Team ' + other(currentTeam) + '\'s steal — answer still hidden</div>' +
      '<div class="btn-row">' +
        '<button class="correct" onclick="awardPoint(\'' + other(currentTeam) + '\')">Correct — +1 Team ' + other(currentTeam) + '</button>' +
        '<button class="wrong" onclick="noPoint()">Wrong — no point</button>' +
      '</div>';
  } else if (phase === 'reveal') {
    statusMsg = 'Round complete';
    controls =
      '<div class="answer-box">' +
        '<div class="answer-label">Answer</div>' +
        '<div class="answer-text">' + q.a + '</div>' +
      '</div>' +
      '<div class="btn-row"><button class="next" onclick="nextQ()">Next question</button></div>';
  }

  el.innerHTML =
    '<div class="scoreboard">' +
      '<div class="team-card team-a ' + teamAClass + '">' +
        '<div class="team-name">Team A</div>' +
        '<div class="team-score">' + scores.A + '</div>' +
        '<div class="team-badge">' + teamABadge + '</div>' +
      '</div>' +
      '<div class="vs">vs</div>' +
      '<div class="team-card team-b ' + teamBClass + '">' +
        '<div class="team-name">Team B</div>' +
        '<div class="team-score">' + scores.B + '</div>' +
        '<div class="team-badge">' + teamBBadge + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="status-bar">' +
      '<span class="status-turn">' + statusMsg + '</span>' +
      '<span style="color:#bbb;font-size:12px;">Q' + (currentQ + 1) + ' of ' + questions.length + ' &nbsp;&middot;&nbsp; Unit ' + q.unit + '</span>' +
    '</div>' +
    '<div class="q-card">' +
      '<div class="q-meta">Unit ' + q.unit + ' &mdash; Question ' + (currentQ + 1) + '</div>' +
      '<div class="q-text">' + q.q + '</div>' +
    '</div>' +
    controls;
}

function awardPoint(team) { scores[team]++; phase = 'reveal'; render(); }
function markWrong()       { stealActive = true; phase = 'steal'; render(); }
function noPoint()         { phase = 'reveal'; render(); }

function nextQ() {
  currentTeam = other(currentTeam);
  currentQ++;
  phase = 'judge';
  stealActive = false;
  render();
}

function renderEnd(el) {
  var winner = scores.A > scores.B ? 'Team A wins!' : scores.B > scores.A ? 'Team B wins!' : "It's a tie!";
  el.innerHTML =
    '<div class="end-screen">' +
      '<div class="winner-text">' + winner + '</div>' +
      '<div class="final-scores">Team A: ' + scores.A + ' pts &nbsp;&middot;&nbsp; Team B: ' + scores.B + ' pts</div>' +
      '<button class="reset" onclick="resetGame()">Play again</button>' +
    '</div>';
}

function resetGame() {
  scores = { A: 0, B: 0 }; currentTeam = 'A'; currentQ = 0;
  phase = 'judge'; stealActive = false; render();
}

render();
</script>
</body>
</html>
