<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoShowdown</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 1.5rem; }
  #app { max-width: 780px; margin: 0 auto; }
  h1.game-title { font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 1.5rem; text-align: center; }
  .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; margin-bottom: 1.25rem; align-items: center; }
  .team-card { border: 1px solid #ddd; border-radius: 12px; padding: 1rem 1.25rem; background: #fff; text-align: center; }
  .team-card.active { border: 2px solid #2563eb; }
  .team-card.steal  { border: 2px solid #d97706; }
  .team-name  { font-size: 12px; color: #888; margin-bottom: 4px; }
  .team-score { font-size: 40px; font-weight: 600; }
  .team-a .team-score { color: #2563eb; }
  .team-b .team-score { color: #16a34a; }
  .team-badge { font-size: 11px; margin-top: 4px; height: 16px; font-weight: 500; }
  .team-a .team-badge { color: #2563eb; }
  .team-b .team-badge { color: #16a34a; }
  .steal-badge { color: #d97706; }
  .vs { font-size: 22px; color: #bbb; text-align: center; font-weight: 500; }
  .status-bar { background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 10px 16px; font-size: 13px; color: #666; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .status-turn { font-weight: 600; color: #1a1a1a; }
  .q-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .q-meta { font-size: 12px; color: #aaa; margin-bottom: 10px; }
  .q-text { font-size: 18px; font-weight: 600; line-height: 1.5; color: #111; }
  .answer-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .answer-label { font-size: 11px; font-weight: 600; color: #16a34a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .answer-text  { font-size: 15px; color: #166534; line-height: 1.5; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .phase-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; margin-bottom: 8px; }
  button { padding: 9px 18px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  button:hover   { background: #f5f5f3; }
  button:active  { transform: scale(0.98); }
  button:disabled { opacity: 0.35; cursor: default; transform: none; }
  button.correct { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
  button.wrong   { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  button.next    { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  button.reset   { background: #1a1a1a; color: #fff; border-color: #1a1a1a; padding: 12px 28px; font-size: 15px; }
  .progress-bar { background: #e5e5e5; border-radius: 4px; height: 4px; margin-bottom: 1.25rem; }
  .progress-fill { background: #2563eb; height: 4px; border-radius: 4px; }
  .unit-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-right: 6px; }
  .unit-5-tag { background: #eff6ff; color: #1d4ed8; }
  .unit-6-tag { background: #f0fdf4; color: #15803d; }
  .end-screen { text-align: center; padding: 3rem 1rem; }
  .winner-text { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
  .final-scores { font-size: 16px; color: #666; margin-bottom: 2rem; }
</style>
</head>
<body>
<div id="app">
  <h1 class="game-title">GeoShowdown &mdash; Units 5 &amp; 6</h1>
  <div id="main"></div>
</div>
<script>
const questions = [
  // ── UNIT 5 : UNDERSTANDING QUALITY OF LIFE ──────────────────────────────
  // Recall
  { unit: 5, q: "What does 'quality of life' mean?", a: "A person's overall well-being and satisfaction with daily life, including health, education, safety, and access to resources." },
  { unit: 5, q: "What is the difference between a need and a want?", a: "A need is essential for survival (food, shelter, water). A want is desired but not required to survive." },
  { unit: 5, q: "Name THREE quality of life indicators.", a: "Any three: literacy rate, life expectancy, access to safe water, income, education level, access to healthcare." },
  { unit: 5, q: "What does life expectancy measure?", a: "The average number of years a person born today is expected to live." },
  { unit: 5, q: "What are Blue Zones?", a: "Regions where people live significantly longer than average, linked to healthy lifestyle and strong community habits." },
  { unit: 5, q: "What does HDI stand for?", a: "Human Development Index." },
  { unit: 5, q: "What are the three components of the HDI?", a: "Life expectancy, education (literacy and school enrolment), and income (GNI per capita)." },
  { unit: 5, q: "What is the difference between an indicator and an index?", a: "An indicator measures one factor; an index combines multiple indicators into a single score." },
  { unit: 5, q: "What does a positive relationship on a scatter graph mean?", a: "As one variable increases, the other also increases — they move in the same direction." },
  { unit: 5, q: "What does a negative relationship on a scatter graph mean?", a: "As one variable increases, the other decreases — they move in opposite directions." },
  { unit: 5, q: "What does a random pattern on a scatter graph show?", a: "There is no clear relationship between the two variables." },
  { unit: 5, q: "Name one factor that affects life expectancy.", a: "Any valid answer: access to healthcare, diet, lifestyle, education, income, clean water." },
  { unit: 5, q: "What is the difference between equality and inequality?", a: "Equality means equal access to resources and opportunities; inequality means some groups have significantly more than others." },
  { unit: 5, q: "Give one example of a basic human need.", a: "Any of: food, clean water, shelter, clothing, healthcare." },
  { unit: 5, q: "What is the HPI?", a: "The Happy Planet Index — measures well-being and environmental sustainability together." },
  // Understanding / Application
  { unit: 5, q: "Why do geographers use multiple indicators rather than just one?", a: "One indicator cannot capture the full picture — combining them gives a more complete and accurate view of quality of life." },
  { unit: 5, q: "How can environmental damage reduce quality of life?", a: "It can harm health, contaminate water, reduce food production, and damage living conditions." },
  { unit: 5, q: "Give one reason why quality of life inequalities persist.", a: "Any valid: gender inequality, environmental damage, rural-urban gaps, poor governance, limited education access." },
  { unit: 5, q: "How does access to education affect quality of life?", a: "Education increases earning potential, improves health literacy, and enables people to make better life decisions." },
  { unit: 5, q: "Why might two countries with the same GDP per capita have very different HDI scores?", a: "GDP only measures income; HDI also includes life expectancy and education, which may differ significantly between countries." },
  { unit: 5, q: "Why do rural areas often have lower quality of life than urban areas?", a: "Rural areas typically have less access to healthcare, education, clean water, and economic opportunities." },
  { unit: 5, q: "How does gender inequality affect a country's quality of life?", a: "When women are excluded from education or work, a country loses half its potential workforce and human capital, lowering overall development." },
  { unit: 5, q: "Give one limitation of using the HDI to compare countries.", a: "It only uses three components and may miss other important factors like inequality, happiness, or environmental quality." },
  { unit: 5, q: "Why might life expectancy be higher in developed countries?", a: "Better access to healthcare, clean water, nutritious food, and higher incomes allow people to live longer, healthier lives." },
  { unit: 5, q: "What does a scatter graph with points clustered close to a line of best fit tell us?", a: "There is a strong relationship between the two variables — they are closely correlated." },
  // Analysis / Evaluation
  { unit: 5, q: "A country has high GDP but low life expectancy and literacy. What does this suggest?", a: "Wealth is not being invested in healthcare or education — economic growth is not improving quality of life for most citizens." },
  { unit: 5, q: "Explain why using only literacy rate to measure quality of life is limited.", a: "Literacy rate only measures one aspect of education. It tells us nothing about income, health, or access to services." },
  { unit: 5, q: "How can improving access to clean water raise a country's HDI score?", a: "Clean water reduces disease, improves health, raises life expectancy, and frees up time (especially for women and children) for education and work." },
  { unit: 5, q: "A Blue Zone community has no gym but high life expectancy. What might explain this?", a: "Natural physical activity (walking, farming), plant-based diet, strong social connections, and low stress levels contribute to longevity without formal exercise." },
  { unit: 5, q: "Why might a happiness index give a different result than the HDI for the same country?", a: "Happiness is subjective — people in poorer countries may report high happiness due to community and culture, while wealthier countries may have high HDI but report lower life satisfaction." },

  // ── UNIT 6 : QUALITY OF LIFE AND THE ECONOMY ────────────────────────────
  // Recall
  { unit: 6, q: "What is GDP?", a: "Gross Domestic Product — the total value of all goods and services produced in a country in one year." },
  { unit: 6, q: "What is GDP per capita?", a: "A country's GDP divided by its population — shows average wealth per person." },
  { unit: 6, q: "What is a market economy?", a: "An economic system where prices and production are determined by supply and demand, with little government control." },
  { unit: 6, q: "What is a command economy?", a: "An economic system where the government controls what is produced, how it is produced, and the prices charged." },
  { unit: 6, q: "What is a mixed economy?", a: "A system combining market and command features — some government control alongside private enterprise." },
  { unit: 6, q: "Name the four economic sectors in order.", a: "Primary (extract), Secondary (manufacture), Tertiary (services), Quaternary (knowledge and research)." },
  { unit: 6, q: "Give an example of a secondary sector job.", a: "Any of: factory worker, car manufacturer, food processing, construction, textile production." },
  { unit: 6, q: "Give an example of a tertiary sector job.", a: "Any of: teacher, doctor, retail worker, banker, truck driver, nurse." },
  { unit: 6, q: "Give an example of a quaternary sector job.", a: "Any of: software developer, research scientist, university professor, AI engineer, consultant." },
  { unit: 6, q: "What is fair trade?", a: "A system ensuring producers in developing countries receive a fair price for their goods and safe working conditions." },
  { unit: 6, q: "What is outsourcing?", a: "When a company hires workers or moves production to another country, usually to reduce labour costs." },
  { unit: 6, q: "What are human resources?", a: "The skills, education, training, and labour that people contribute to an economy." },
  { unit: 6, q: "Name TWO geographic factors that affect a country's wealth.", a: "Any two: natural resources, location or access to trade routes, climate, coastal access, fertile land." },
  { unit: 6, q: "What is a supply chain?", a: "The sequence of steps involved in producing and delivering a product, from raw materials to the final consumer." },
  { unit: 6, q: "Give one example of a natural resource that can drive economic development.", a: "Any of: oil, natural gas, diamonds, fertile farmland, timber, fish stocks, minerals." },
  // Understanding / Application
  { unit: 6, q: "Why is GDP per capita more useful than total GDP when comparing countries?", a: "It accounts for population size, showing average wealth per person rather than total national wealth, making comparisons between large and small countries fairer." },
  { unit: 6, q: "Give ONE limitation of using GDP per capita to measure quality of life.", a: "It does not show how wealth is distributed — a country can have high GDP per capita but still have extreme inequality." },
  { unit: 6, q: "How does education improve a country's economy?", a: "It develops a skilled workforce, raises productivity, attracts foreign investment, and enables innovation." },
  { unit: 6, q: "How do employment patterns change as a country develops?", a: "Workers shift from primary to secondary, and eventually to tertiary and quaternary sectors as the economy grows." },
  { unit: 6, q: "Why might a landlocked country struggle to develop economically?", a: "Without sea access, trade is more expensive and slower, limiting the country's ability to export goods and attract investment." },
  { unit: 6, q: "How does fair trade aim to improve quality of life in developing countries?", a: "By guaranteeing farmers and producers a minimum fair price, stable income, and better working conditions, allowing communities to invest in schools and healthcare." },
  { unit: 6, q: "Why do companies outsource to other countries?", a: "To reduce labour costs, access larger workforces, and increase profit margins." },
  { unit: 6, q: "Name one benefit AND one drawback of global trade.", a: "Benefit: economic growth, access to goods, job creation. Drawback: unequal profit distribution, worker exploitation, environmental damage." },
  { unit: 6, q: "Why might a country rich in natural resources still have a low HDI?", a: "Resource wealth may be controlled by a small elite, government corruption may prevent reinvestment, or resources may be exported with little local benefit." },
  { unit: 6, q: "How does location near a major trade route improve a country's economy?", a: "It allows the country to charge transit fees, attract trade, develop ports and infrastructure, and access larger markets more cheaply." },
  // Analysis / Evaluation
  { unit: 6, q: "A developing country shifts most workers from farming to manufacturing. What stage of development is this?", a: "The country is transitioning from primary to secondary sector dominance — an early stage of industrialisation typical of developing economies." },
  { unit: 6, q: "Why might a command economy struggle to meet citizens' needs?", a: "The government controls all production and prices, so it may not respond efficiently to what people actually want or need, leading to shortages." },
  { unit: 6, q: "A worker in Cote d'Ivoire grows cocoa but earns very little. A company in Europe sells chocolate and earns billions. What issue does this illustrate?", a: "It illustrates the unequal distribution of profit in global trade — primary producers in developing countries receive a tiny share compared to manufacturers and retailers in wealthy countries." },
  { unit: 6, q: "Why might outsourcing harm workers in the host country even though it creates jobs?", a: "Jobs created through outsourcing often have low wages, poor conditions, long hours, and little job security, which may not significantly improve quality of life." },
  { unit: 6, q: "Explain how a country moving from primary to quaternary sector employment would affect its HDI score.", a: "Higher-skilled, better-paid jobs in the tertiary and quaternary sectors raise income, fund better education and healthcare, and increase life expectancy — all raising HDI." },
];

let scores = { A: 0, B: 0 };
let currentTeam = 'A';
let currentQ = 0;
let phase = 'judge';
let stealActive = false;

function other(t) { return t === 'A' ? 'B' : 'A'; }

function render() {
  const el = document.getElementById('main');
  if (currentQ >= questions.length) { renderEnd(el); return; }

  const q = questions[currentQ];
  const pct = Math.round((currentQ / questions.length) * 100);
  const answeringTeam = stealActive ? other(currentTeam) : currentTeam;
  const teamAClass = answeringTeam === 'A' ? (stealActive ? 'steal' : 'active') : '';
  const teamBClass = answeringTeam === 'B' ? (stealActive ? 'steal' : 'active') : '';
  const teamABadge = answeringTeam === 'A' ? (stealActive ? '<span class="steal-badge">steal!</span>' : 'answering') : '&nbsp;';
  const teamBBadge = answeringTeam === 'B' ? (stealActive ? '<span class="steal-badge">steal!</span>' : 'answering') : '&nbsp;';

  let statusMsg = '';
  let controls = '';
  const unitTag = '<span class="unit-tag unit-' + q.unit + '-tag">Unit ' + q.unit + '</span>';

  if (phase === 'judge') {
    statusMsg = 'Team ' + currentTeam + ' answers out loud — then judge';
    controls =
      '<div class="phase-label">Judge Team ' + currentTeam + '\'s answer &mdash; answer not shown yet</div>' +
      '<div class="btn-row">' +
        '<button class="correct" onclick="awardPoint(\'' + currentTeam + '\')">Correct &mdash; +1 Team ' + currentTeam + '</button>' +
        '<button class="wrong" onclick="markWrong()">Wrong &mdash; give steal chance</button>' +
      '</div>';
  } else if (phase === 'steal') {
    statusMsg = 'Team ' + other(currentTeam) + ' &mdash; steal opportunity!';
    controls =
      '<div class="phase-label">Judge Team ' + other(currentTeam) + '\'s steal &mdash; answer still hidden</div>' +
      '<div class="btn-row">' +
        '<button class="correct" onclick="awardPoint(\'' + other(currentTeam) + '\')">Correct &mdash; +1 Team ' + other(currentTeam) + '</button>' +
        '<button class="wrong" onclick="noPoint()">Wrong &mdash; no point</button>' +
      '</div>';
  } else if (phase === 'reveal') {
    statusMsg = 'Round complete';
    controls =
      '<div class="answer-box">' +
        '<div class="answer-label">Answer</div>' +
        '<div class="answer-text">' + q.a + '</div>' +
      '</div>' +
      '<div class="btn-row"><button class="next" onclick="nextQ()">Next question</button></div>';
  }

  el.innerHTML =
    '<div class="scoreboard">' +
      '<div class="team-card team-a ' + teamAClass + '">' +
        '<div class="team-name">Team A</div>' +
        '<div class="team-score">' + scores.A + '</div>' +
        '<div class="team-badge">' + teamABadge + '</div>' +
      '</div>' +
      '<div class="vs">vs</div>' +
      '<div class="team-card team-b ' + teamBClass + '">' +
        '<div class="team-name">Team B</div>' +
        '<div class="team-score">' + scores.B + '</div>' +
        '<div class="team-badge">' + teamBBadge + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="status-bar">' +
      '<span class="status-turn">' + statusMsg + '</span>' +
      '<span style="color:#bbb;font-size:12px;">Q' + (currentQ + 1) + ' of ' + questions.length + '</span>' +
    '</div>' +
    '<div class="q-card">' +
      '<div class="q-meta">' + unitTag + 'Question ' + (currentQ + 1) + '</div>' +
      '<div class="q-text">' + q.q + '</div>' +
    '</div>' +
    controls;
}

function awardPoint(team) { scores[team]++; phase = 'reveal'; render(); }
function markWrong()       { stealActive = true; phase = 'steal'; render(); }
function noPoint()         { phase = 'reveal'; render(); }

function nextQ() {
  currentTeam = other(currentTeam);
  currentQ++;
  phase = 'judge';
  stealActive = false;
  render();
}

function renderEnd(el) {
  var winner = scores.A > scores.B ? 'Team A wins!' : scores.B > scores.A ? 'Team B wins!' : "It's a tie!";
  el.innerHTML =
    '<div class="end-screen">' +
      '<div class="winner-text">' + winner + '</div>' +
      '<div class="final-scores">Team A: ' + scores.A + ' pts &nbsp;&middot;&nbsp; Team B: ' + scores.B + ' pts</div>' +
      '<button class="reset" onclick="resetGame()">Play again</button>' +
    '</div>';
}

function resetGame() {
  scores = { A: 0, B: 0 }; currentTeam = 'A'; currentQ = 0;
  phase = 'judge'; stealActive = false; render();
}

render();
</script>
</body>
</html>
