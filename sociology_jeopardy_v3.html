<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sociology Jeopardy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0e2a;
    --deep: #060919;
    --gold: #f5c518;
    --gold-dim: #b8941a;
    --gold-glow: rgba(245,197,24,0.25);
    --card-bg: #111740;
    --card-hover: #1a2160;
    --used: #1a1a2e;
    --text: #e8ecf5;
    --muted: #6b7ba4;
    --correct: #22c55e;
    --wrong: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--deep); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 88%, rgba(255,255,255,0.35) 0%, transparent 100%);
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 20px;
  }
  #setup-screen h1 {
    font-family: 'Bebas Neue', cursive; font-size: clamp(2.5rem, 6vw, 4rem);
    letter-spacing: 4px; color: var(--gold);
    text-shadow: 0 0 30px var(--gold-glow);
    margin-bottom: 6px;
  }
  #setup-screen p.subtitle { color: var(--muted); font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 40px; }

  #setup-box {
    background: var(--card-bg); border: 1px solid rgba(245,197,24,0.2);
    border-radius: 16px; padding: 36px 40px; width: 100%; max-width: 560px;
  }
  #setup-box h2 {
    font-family: 'Bebas Neue', cursive; font-size: 1.6rem; letter-spacing: 2px;
    color: var(--gold); margin-bottom: 20px;
  }

  #teams-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .team-input-row {
    display: flex; align-items: center; gap: 10px;
  }
  .team-color-dot {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
  }
  .team-name-input {
    flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    color: var(--text); font-family: 'Barlow', sans-serif; font-size: 1rem;
    border-radius: 8px; padding: 10px 14px;
  }
  .team-name-input:focus { outline: none; border-color: var(--gold-dim); }
  .btn-remove-team {
    background: none; border: none; color: var(--muted); font-size: 1.2rem;
    cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color 0.2s;
    line-height: 1;
  }
  .btn-remove-team:hover { color: var(--wrong); }

  #btn-add-team {
    background: rgba(245,197,24,0.08); border: 1px dashed var(--gold-dim);
    color: var(--gold); font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; font-size: 0.9rem; letter-spacing: 1px;
    border-radius: 8px; padding: 10px 20px; cursor: pointer; width: 100%;
    transition: background 0.2s; margin-bottom: 28px;
  }
  #btn-add-team:hover { background: rgba(245,197,24,0.15); }

  #btn-start {
    width: 100%; background: linear-gradient(135deg, var(--gold), #d4a017);
    color: var(--navy); font-family: 'Bebas Neue', cursive; font-size: 1.5rem;
    letter-spacing: 3px; border: none; border-radius: 10px; padding: 14px;
    cursor: pointer; transition: all 0.2s;
  }
  #btn-start:hover { transform: scale(1.02); box-shadow: 0 6px 24px var(--gold-glow); }

  /* ── GAME SCREEN ── */
  #game-screen { display: none; position: relative; z-index: 1; }

  #header {
    text-align: center; padding: 14px 20px 8px;
    border-bottom: 2px solid var(--gold-dim);
    background: linear-gradient(180deg, rgba(10,14,42,0.95) 0%, transparent 100%);
  }
  #header h1 {
    font-family: 'Bebas Neue', cursive; font-size: clamp(1.8rem, 4vw, 3rem);
    letter-spacing: 4px; color: var(--gold);
    text-shadow: 0 0 24px var(--gold-glow);
  }
  #header p { font-size: 0.8rem; color: var(--muted); letter-spacing: 1px; margin-top: 1px; }

  /* ── SCOREBOARD ── */
  #scoreboard {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 10px; padding: 12px 16px; position: relative; z-index: 1;
  }
  .team-card {
    background: var(--card-bg); border: 2px solid transparent;
    border-radius: 10px; padding: 10px 18px; text-align: center;
    min-width: 120px; transition: all 0.25s; position: relative; overflow: hidden;
    cursor: pointer;
  }
  .team-card::before {
    content: ''; position: absolute; inset: 0; opacity: 0;
    transition: opacity 0.25s;
  }
  .team-card.active { transform: scale(1.05); }
  .team-card.active::before { opacity: 1; }
  .team-card .t-label {
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem;
    font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    opacity: 0; transition: opacity 0.25s; margin-bottom: 2px;
  }
  .team-card.active .t-label { opacity: 1; }
  .team-card .t-name {
    font-family: 'Bebas Neue', cursive; font-size: 1.2rem; letter-spacing: 1px;
  }
  .team-card .t-score {
    font-family: 'Bebas Neue', cursive; font-size: 1.9rem; line-height: 1;
  }
  .score-adj { display: flex; gap: 4px; margin-top: 5px; justify-content: center; }
  .score-adj button {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: var(--text); border-radius: 5px; font-size: 0.9rem;
    width: 26px; height: 24px; cursor: pointer; transition: background 0.2s;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; line-height: 1;
  }
  .score-adj button:hover { background: rgba(255,255,255,0.2); }
  .score-flash {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'Bebas Neue', cursive; font-size: 1.6rem;
    pointer-events: none; z-index: 20; animation: flashUp 1.2s forwards;
  }
  .score-flash.pos { color: var(--correct); }
  .score-flash.neg { color: var(--wrong); }
  @keyframes flashUp {
    0% { opacity:1; transform:translate(-50%,-50%) scale(1.2); }
    60% { opacity:0.8; transform:translate(-50%,-130%) scale(1); }
    100% { opacity:0; transform:translate(-50%,-180%) scale(0.8); }
  }

  #turn-indicator {
    text-align: center; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; letter-spacing: 2px; font-size: 0.8rem;
    color: var(--gold); padding: 3px 0 6px; position: relative; z-index: 1;
  }

  /* ── BOARD ── */
  #board-wrap { padding: 0 12px 12px; position: relative; z-index: 1; }
  #board {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 5px; max-width: 1100px; margin: 0 auto;
  }
  .cat-header {
    background: var(--gold); color: var(--navy);
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(0.65rem, 1.5vw, 1rem);
    letter-spacing: 1px; text-align: center;
    padding: 10px 5px; border-radius: 5px; line-height: 1.2;
  }
  .clue-cell {
    background: var(--card-bg); border: 1px solid rgba(245,197,24,0.18);
    border-radius: 5px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; min-height: 56px;
  }
  .clue-cell:hover:not(.used) {
    background: var(--card-hover); border-color: var(--gold-dim);
    transform: translateY(-2px); box-shadow: 0 5px 16px rgba(245,197,24,0.12);
  }
  .clue-cell .val {
    font-family: 'Bebas Neue', cursive; font-size: clamp(1.1rem, 2.8vw, 1.7rem);
    color: var(--gold); text-shadow: 0 0 10px var(--gold-glow);
  }
  .clue-cell.used { background: var(--used); border-color: rgba(255,255,255,0.03); cursor: default; opacity: 0.3; }
  .clue-cell.used .val { color: var(--muted); text-shadow: none; }

  #final-btn {
    display: block; margin: 12px auto 0;
    background: linear-gradient(135deg, var(--gold), #d4a017);
    color: var(--navy); font-family: 'Bebas Neue', cursive;
    font-size: 1.3rem; letter-spacing: 3px; border: none;
    border-radius: 8px; padding: 10px 32px; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 4px 16px var(--gold-glow);
  }
  #final-btn:hover { transform: scale(1.03); }

  /* ── MODAL ── */
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(4,6,20,0.92); backdrop-filter: blur(6px);
    z-index: 100; align-items: center; justify-content: center; padding: 20px;
  }
  #overlay.show { display: flex; }
  #modal {
    background: linear-gradient(160deg, #0f1640 0%, #0a0e2a 100%);
    border: 2px solid var(--gold-dim); border-radius: 14px;
    padding: 30px 36px; max-width: 720px; width: 100%;
    box-shadow: 0 0 50px rgba(245,197,24,0.1), 0 20px 50px rgba(0,0,0,0.6);
    animation: modalIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes modalIn {
    from { transform: scale(0.88) translateY(16px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  #modal-cat {
    font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem;
    font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 4px;
  }
  #modal-points {
    font-family: 'Bebas Neue', cursive; font-size: 2.6rem; color: var(--gold);
    text-shadow: 0 0 18px var(--gold-glow); line-height: 1; margin-bottom: 16px;
  }
  #modal-clue {
    font-size: 1.2rem; font-weight: 500; line-height: 1.55;
    color: var(--text); margin-bottom: 20px; min-height: 56px;
  }

  /* TIMER */
  #timer-wrap { margin-bottom: 16px; }
  #timer-bar-bg { background: rgba(255,255,255,0.08); border-radius: 4px; height: 7px; overflow: hidden; }
  #timer-bar { height: 100%; width: 100%; background: var(--correct); border-radius: 4px; transition: width 1s linear, background 0.5s; }
  #timer-bar.danger { background: var(--wrong); animation: blink 0.5s infinite; }
  @keyframes blink { 50% { opacity: 0.4; } }
  #timer-num { font-family: 'Bebas Neue', cursive; font-size: 1.2rem; color: var(--gold); text-align: right; margin-top: 3px; }
  #timer-num.danger { color: var(--wrong); }

  /* ANSWER */
  #answer-wrap {
    background: rgba(245,197,24,0.06); border: 1px solid var(--gold-dim);
    border-radius: 8px; padding: 12px 16px; margin-bottom: 18px; display: none;
  }
  #answer-wrap.show { display: block; }
  #answer-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-dim); margin-bottom: 5px; }
  #answer-text { font-size: 1rem; color: var(--gold); font-weight: 600; line-height: 1.4; }

  /* WAGER */
  #wager-section { background: rgba(245,197,24,0.05); border: 1px solid var(--gold-dim); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  #wager-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 8px; }
  #wager-row { display: flex; gap: 10px; align-items: center; }
  #wager-input { background: rgba(255,255,255,0.06); border: 1px solid var(--gold-dim); color: var(--gold); font-family: 'Bebas Neue', cursive; font-size: 1.7rem; text-align: center; border-radius: 6px; padding: 6px 12px; width: 140px; }
  #wager-input:focus { outline: none; border-color: var(--gold); }

  /* SCORING BUTTONS */
  #scoring-section { margin-bottom: 0; }
  #scoring-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  #team-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .team-btn-correct {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.88rem;
    letter-spacing: 1px; border: none; border-radius: 7px; padding: 9px 16px;
    cursor: pointer; transition: all 0.18s; text-transform: uppercase; color: #fff;
  }
  .team-btn-correct:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .team-btn-wrong {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.88rem;
    letter-spacing: 1px; border-radius: 7px; padding: 9px 16px;
    cursor: pointer; transition: all 0.18s; text-transform: uppercase;
    background: rgba(255,255,255,0.05);
  }
  .team-btn-wrong:hover { filter: brightness(1.2); transform: translateY(-1px); }

  .action-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start; margin-top: 10px; }
  .btn { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.9rem; letter-spacing: 1.5px; border: none; border-radius: 7px; padding: 9px 18px; cursor: pointer; transition: all 0.18s; text-transform: uppercase; }
  .btn:hover { transform: translateY(-1px); }
  .btn-reveal { background: rgba(245,197,24,0.14); color: var(--gold); border: 1px solid var(--gold-dim); }
  .btn-skip { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }
  .btn-close { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }
  .btn-gold { background: linear-gradient(135deg, var(--gold), #d4a017); color: var(--navy); }

  /* ── FINAL JEOPARDY ── */
  #fj-overlay { display: none; position: fixed; inset: 0; background: rgba(4,6,20,0.96); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
  #fj-overlay.show { display: flex; }
  #fj-modal { background: linear-gradient(160deg, #0f1640 0%, #0a0e2a 100%); border: 2px solid var(--gold); border-radius: 14px; padding: 30px 36px; max-width: 700px; width: 100%; box-shadow: 0 0 60px rgba(245,197,24,0.18); animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  #fj-modal h2 { font-family: 'Bebas Neue', cursive; font-size: 2.4rem; color: var(--gold); letter-spacing: 4px; text-align: center; margin-bottom: 4px; }
  .fj-cat-label { text-align: center; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: 2px; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 20px; }

  #fj-wager-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .fj-wager-row { display: flex; align-items: center; gap: 12px; background: var(--card-bg); border-radius: 8px; padding: 10px 14px; }
  .fj-team-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .fj-team-label { font-family: 'Bebas Neue', cursive; font-size: 1.1rem; letter-spacing: 1px; flex: 1; }
  .fj-team-score-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; color: var(--muted); }
  .fj-wager-input { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: var(--text); font-family: 'Bebas Neue', cursive; font-size: 1.3rem; text-align: center; border-radius: 6px; padding: 5px 10px; width: 100px; }
  .fj-wager-input:focus { outline: none; border-color: var(--gold-dim); }

  #fj-clue-box { font-size: 1.15rem; font-weight: 500; line-height: 1.55; color: var(--text); background: rgba(245,197,24,0.05); border: 1px solid var(--gold-dim); border-radius: 8px; padding: 16px 18px; margin: 14px 0; display: none; }
  #fj-clue-box.show { display: block; }
  #fj-answer-box { display: none; background: rgba(245,197,24,0.08); border: 1px solid var(--gold-dim); border-radius: 8px; padding: 10px 14px; color: var(--gold); font-weight: 600; margin-bottom: 14px; font-size: 0.95rem; line-height: 1.4; }
  #fj-answer-box.show { display: block; }

  #fj-judge-grid { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; display: none; }
  #fj-judge-grid.show { display: flex; }
  .fj-judge-row { display: flex; align-items: center; gap: 10px; background: var(--card-bg); border-radius: 8px; padding: 8px 14px; }
  .fj-judge-name { font-family: 'Bebas Neue', cursive; font-size: 1.1rem; letter-spacing: 1px; flex: 1; }
  .fj-judge-wager { font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; color: var(--muted); margin-right: 6px; }
  .fj-judge-btn { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.82rem; letter-spacing: 1px; border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer; text-transform: uppercase; transition: all 0.18s; }
  .fj-judge-btn:hover { filter: brightness(1.15); }
  .fj-judge-result { font-family: 'Bebas Neue', cursive; font-size: 1rem; }

  /* WINNER */
  #winner-overlay { display: none; position: fixed; inset: 0; background: rgba(4,6,20,0.97); z-index: 300; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 20px; }
  #winner-overlay.show { display: flex; }
  #winner-overlay h1 { font-family: 'Bebas Neue', cursive; font-size: clamp(2.5rem, 7vw, 5rem); color: var(--gold); letter-spacing: 6px; text-shadow: 0 0 50px var(--gold-glow); animation: glow 2s infinite; }
  @keyframes glow { 0%,100%{text-shadow:0 0 40px var(--gold-glow)} 50%{text-shadow:0 0 80px rgba(245,197,24,0.5)} }
  #winner-scores { display: flex; flex-wrap: wrap; gap: 14px; margin: 24px 0; justify-content: center; }
  .winner-card { padding: 16px 28px; border-radius: 10px; border: 2px solid; }
  .winner-card .wc-name { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; letter-spacing: 2px; }
  .winner-card .wc-score { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; line-height: 1; }
  #winner-label { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; color: var(--muted); margin-top: 6px; }
  #play-again { margin-top: 16px; background: linear-gradient(135deg, var(--gold), #d4a017); color: var(--navy); font-family: 'Bebas Neue', cursive; font-size: 1.3rem; letter-spacing: 3px; border: none; border-radius: 8px; padding: 12px 36px; cursor: pointer; transition: transform 0.2s; }
  #play-again:hover { transform: scale(1.04); }

  .confetti-piece { position: fixed; width: 9px; height: 9px; top: -10px; animation: cfFall linear forwards; z-index: 400; border-radius: 2px; }
  @keyframes cfFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div id="setup-screen">
  <h1>Sociology Jeopardy</h1>
  <p class="subtitle">Butler &nbsp;·&nbsp; bell hooks &nbsp;·&nbsp; Walby</p>
  <div id="setup-box">
    <h2>Add Your Teams</h2>
    <div id="teams-list"></div>
    <button id="btn-add-team" onclick="addTeam()">+ Add Team</button>
    <button id="btn-start" onclick="startGame()">START GAME</button>
  </div>
</div>

<!-- ── GAME SCREEN ── -->
<div id="game-screen">
  <div id="header">
    <h1>Sociology Jeopardy</h1>
    <p>Identify the theorist — Butler &nbsp;·&nbsp; bell hooks &nbsp;·&nbsp; Walby</p>
  </div>
  <div id="scoreboard"></div>
  <div id="turn-indicator"></div>
  <div id="board-wrap">
    <div id="board"></div>
    <button id="final-btn" onclick="launchFinal()">⭐ FINAL JEOPARDY</button>
  </div>
</div>

<!-- ── CLUE MODAL ── -->
<div id="overlay">
  <div id="modal">
    <div id="modal-cat"></div>
    <div id="modal-points"></div>
    <div id="wager-section" style="display:none;">
      <div id="wager-label">DAILY DOUBLE — Enter Your Wager</div>
      <div id="wager-row">
        <input type="number" id="wager-input" placeholder="0" min="0">
        <button class="btn btn-gold" onclick="confirmWager()">CONFIRM</button>
      </div>
    </div>
    <div id="modal-clue"></div>
    <div id="timer-wrap">
      <div id="timer-bar-bg"><div id="timer-bar"></div></div>
      <div id="timer-num">60</div>
    </div>
    <div id="answer-wrap">
      <div id="answer-label">Correct Response</div>
      <div id="answer-text"></div>
    </div>
    <div id="scoring-section">
      <div id="scoring-label">Award / Deduct Points</div>
      <div id="team-buttons"></div>
      <div class="action-row">
        <button class="btn btn-reveal" onclick="revealAnswer()">Reveal Answer</button>
        <button class="btn btn-skip" onclick="skipClue()">Skip</button>
      </div>
    </div>
  </div>
</div>

<!-- ── FINAL JEOPARDY ── -->
<div id="fj-overlay">
  <div id="fj-modal">
    <h2>Final Jeopardy</h2>
    <div class="fj-cat-label" id="fj-cat-label"></div>
    <div id="fj-step-wager">
      <div id="fj-wager-grid"></div>
      <div class="action-row" style="justify-content:center;">
        <button class="btn btn-gold" onclick="fjRevealClue()">REVEAL CLUE</button>
      </div>
    </div>
    <div id="fj-clue-box"></div>
    <div id="fj-answer-box"></div>
    <div id="fj-judge-grid"></div>
    <div class="action-row" id="fj-actions" style="justify-content:center; margin-top:12px; display:none;">
      <button class="btn btn-reveal" onclick="fjRevealAnswer()">Reveal Answer</button>
      <button class="btn btn-gold" onclick="fjFinish()" id="fj-finish-btn" style="display:none;">SEE WINNER</button>
    </div>
  </div>
</div>

<!-- ── WINNER ── -->
<div id="winner-overlay">
  <h1>🏆 WINNER!</h1>
  <div id="winner-label"></div>
  <div id="winner-scores"></div>
  <button id="play-again" onclick="location.reload()">PLAY AGAIN</button>
</div>

<script>
// ─── PALETTE for teams ────────────────────────
const TEAM_COLORS = [
  { bg: "#2563eb", light: "#93c5fd", glow: "rgba(37,99,235,0.35)" },
  { bg: "#dc2626", light: "#fca5a5", glow: "rgba(220,38,38,0.35)" },
  { bg: "#16a34a", light: "#86efac", glow: "rgba(22,163,74,0.35)" },
  { bg: "#9333ea", light: "#d8b4fe", glow: "rgba(147,51,234,0.35)" },
  { bg: "#ea580c", light: "#fdba74", glow: "rgba(234,88,12,0.35)" },
  { bg: "#0891b2", light: "#67e8f9", glow: "rgba(8,145,178,0.35)" },
  { bg: "#ca8a04", light: "#fde047", glow: "rgba(202,138,4,0.35)" },
  { bg: "#be185d", light: "#f9a8d4", glow: "rgba(190,24,93,0.35)" },
];

// ─── GAME DATA ────────────────────────────────
const CATEGORIES = [
  {
    name: "DEFINE IT",
    clues: [
      { pts:100, clue:"According to this theorist, gender is not something you ARE — it is something you DO, produced through repeated everyday actions.", answer:"Who is Judith Butler? (gender performativity)" },
      { pts:200, clue:"This theorist defines patriarchy as a system of six interlocking structures — not a single law or attitude — that together produce gender inequality.", answer:"Who is Sylvia Walby? (six structures of patriarchy)" },
      { pts:300, clue:"This theorist defines the concept that race, class, and gender do not operate separately but overlap and interact to shape a person's experience of inequality.", answer:"Who is bell hooks? (intersectionality)" },
      { pts:400, clue:"This theorist argues that 'heterosexuality being the expected norm' is itself a structure of patriarchy — one of six — that reinforces gender inequality.", answer:"Who is Sylvia Walby? (patriarchy in sexuality)" },
      { pts:500, clue:"This theorist argues that performing gender 'incorrectly' — such as a boy crying — triggers social punishment that enforces and reproduces gendered norms.", answer:"Who is Judith Butler? (regulation of gender performance)" },
    ]
  },
  {
    name: "SPOT THE THEORY",
    clues: [
      { pts:100, clue:"A researcher argues gender inequality persists not because of individual prejudice, but because of six mutually reinforcing social structures. Whose framework is this?", answer:"Who is Sylvia Walby? (six structures of patriarchy)" },
      { pts:200, clue:"A sociologist says we cannot understand a Black woman's experience of discrimination by looking at gender alone OR race alone — only their combination. Whose framework is this?", answer:"Who is bell hooks? (intersectionality / matrix of domination)" },
      { pts:300, clue:"A theorist argues drag performances are sociologically significant because they expose gender as a constructed performance with no original beneath it. Whose framework is this?", answer:"Who is Judith Butler? (gender performativity / parody)" },
      { pts:400, clue:"A policy report concludes equal pay laws are insufficient on their own — because workplace norms, culture, and household roles all reinforce each other. Whose framework does this reflect?", answer:"Who is Sylvia Walby? (interdependence of patriarchal structures)" },
      { pts:500, clue:"A feminist writer argues that mainstream feminist movements have failed by centring the voices of white, middle-class women while ignoring others. Whose critique is this?", answer:"Who is bell hooks? (critique of white mainstream feminism)" },
    ]
  },
  {
    name: "REAL-WORLD EXAMPLE",
    clues: [
      { pts:100, clue:"A social media app suggests different fashion filters depending on whether users select 'male' or 'female'. Which theorist's ideas best explain why this is sociologically significant?", answer:"Who is Judith Butler? (media reinforcing gender norms)" },
      { pts:200, clue:"A university women's leadership program finds most participants are wealthy — women from low-income communities rarely benefit. Which theorist's framework explains this limitation?", answer:"Who is bell hooks? (intersectionality — class and gender interact)" },
      { pts:300, clue:"A country passes generous parental leave laws, but men rarely take the leave because workplace culture and social expectations discourage it. Which theorist predicted this outcome?", answer:"Who is Sylvia Walby? (structures of patriarchy reinforce each other)" },
      { pts:400, clue:"In Taiwan, women earn less than men on average, are underrepresented in senior roles, and perform more unpaid domestic work. Which theorist's six-part framework maps this most directly?", answer:"Who is Sylvia Walby? (paid work + household production structures)", dailyDouble:true },
      { pts:500, clue:"A young man is publicly mocked for wearing nail polish at school and changes his appearance to avoid further ridicule. Which theorist would argue this is how gender norms are reproduced?", answer:"Who is Judith Butler? (social regulation of gender performance)" },
    ]
  },
  {
    name: "NAME THE THEORIST",
    clues: [
      { pts:100, clue:"She argued that gender is performative — there is no natural or original gender identity beneath the performance.", answer:"Who is Judith Butler? (gender performativity)" },
      { pts:200, clue:"She argued that inequality cannot be understood by looking at gender, race, or class separately — only through their interaction.", answer:"Who is bell hooks? (intersectionality)" },
      { pts:300, clue:"She identified six structures — including paid work, the state, and male violence — through which patriarchy operates as a system.", answer:"Who is Sylvia Walby? (six structures of patriarchy)" },
      { pts:400, clue:"She argued that lived experience — especially of marginalised people — is a valid and important source of sociological knowledge that dominant groups often dismiss.", answer:"Who is bell hooks? (lived experience as knowledge)" },
      { pts:500, clue:"She distinguishes between 'private patriarchy' — where women are controlled mainly in the household — and 'public patriarchy' — where control operates through employment and the state.", answer:"Who is Sylvia Walby? (private vs. public patriarchy)" },
    ]
  },
  {
    name: "CRITIQUE & EVALUATE",
    clues: [
      { pts:100, clue:"A critic argues this theorist's ideas focus too heavily on language and performance, and neglect the material economic conditions that shape women's lives.", answer:"Who is Judith Butler? (limitation: neglects material/economic factors)" },
      { pts:200, clue:"This theorist has been criticised for treating patriarchy as a relatively stable system — making it harder to explain why gender inequality looks different across cultures and time.", answer:"Who is Sylvia Walby? (limitation: underestimates variation across contexts)" },
      { pts:300, clue:"This theorist is praised for showing that no single axis of identity — not gender, not race, not class alone — can explain inequality. This is her most important contribution.", answer:"Who is bell hooks? (strength: intersectionality)" },
      { pts:400, clue:"A student argues this theorist's framework does not clearly show how the six structures cause each other — only that they coexist. Which theorist is being critiqued?", answer:"Who is Sylvia Walby? (critique: unclear causal relationships between structures)" },
      { pts:500, clue:"This theorist is critiqued for writing in highly abstract, dense academic language that is difficult for ordinary people to access — somewhat contradicting the democratic aims of feminist theory.", answer:"Who is Judith Butler? (critique: inaccessible academic language)" },
    ]
  },
  {
    name: "ALL THREE",
    clues: [
      { pts:100, clue:"All three theorists studied this unit reject this as the main explanation for gender inequality. Name what they all reject.", answer:"Biological or individualistic explanation — all three argue inequality is structural/social" },
      { pts:200, clue:"Both Butler and hooks agree gender cannot be understood in isolation — but they differ on what else must be considered. Name both theorists and the key difference.", answer:"Who are Butler and hooks? (Butler adds sexuality/norms; hooks adds race and class)" },
      { pts:300, clue:"Walby and hooks both identify institutions as sites of inequality — but focus on different ones. Name a key institution each theorist emphasises.", answer:"Walby: paid work, state, household / hooks: education, media, family" },
      { pts:400, clue:"All three theorists would critique a policy giving men and women identical parental leave — but for different reasons. Give each theorist's reason.", answer:"Butler: norms still dictate who uses it; hooks: class/race create unequal access; Walby: household + workplace structures still disadvantage women" },
      { pts:500, clue:"Compare how Butler and Walby understand patriarchy. What does each say it is, and what is the key difference in their approaches?", answer:"Butler: cultural/discursive (repeated performances of norms). Walby: structural/material (six interlocking institutions). Key difference: Butler = identity/culture; Walby = institutions/economy" },
    ]
  }
];

const FINAL_JEOPARDY = {
  category: "THE BIG PICTURE",
  clue: "All three theorists believe gender inequality is structural — not individual. For each theorist, name their central concept AND identify one real-world institution or example where their theory applies.",
  answer: "Butler: gender performativity → e.g. school dress codes enforcing gender norms. hooks: intersectionality → e.g. a women's program that fails low-income women of colour. Walby: six structures of patriarchy → e.g. the gender pay gap as a result of paid work + household production reinforcing each other."
};

// ─── STATE ────────────────────────────────────
let teams = [];       // { name, color, score }
let activeIdx = 0;
let currentClue = null;
let timerInterval = null;
let timerSeconds = 60;
let wagerAmount = 0;
let fjJudged = [];
let audioCtx = null;

// ─── SETUP ───────────────────────────────────
function addTeam(name="") {
  const idx = document.querySelectorAll('.team-input-row').length;
  const color = TEAM_COLORS[idx % TEAM_COLORS.length];
  const row = document.createElement('div');
  row.className = 'team-input-row';
  row.innerHTML = `
    <div class="team-color-dot" style="background:${color.bg}"></div>
    <input class="team-name-input" type="text" placeholder="Team name…" value="${name}" maxlength="20">
    <button class="btn-remove-team" onclick="this.parentElement.remove(); recolorDots()">✕</button>
  `;
  document.getElementById('teams-list').appendChild(row);
}

function recolorDots() {
  document.querySelectorAll('.team-input-row').forEach((row, i) => {
    const color = TEAM_COLORS[i % TEAM_COLORS.length];
    row.querySelector('.team-color-dot').style.background = color.bg;
  });
}

function startGame() {
  const inputs = document.querySelectorAll('.team-name-input');
  teams = [];
  inputs.forEach((inp, i) => {
    const name = inp.value.trim() || `Team ${i+1}`;
    teams.push({ name, color: TEAM_COLORS[i % TEAM_COLORS.length], score: 0 });
  });
  if (teams.length < 1) { addTeam(); return; }
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  buildScoreboard();
  buildBoard();
  updateTurnIndicator();
}

// Default teams on load
window.onload = () => { addTeam("Team A"); addTeam("Team B"); };

// ─── SCOREBOARD ──────────────────────────────
function buildScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  teams.forEach((t, i) => {
    const c = t.color;
    const card = document.createElement('div');
    card.className = 'team-card' + (i === activeIdx ? ' active' : '');
    card.id = `card-${i}`;
    card.style.borderColor = c.bg;
    card.style.setProperty('--glow', c.glow);
    card.innerHTML = `
      <div class="t-label" style="color:${c.light}">ACTIVE</div>
      <div class="t-name" style="color:${c.light}">${t.name}</div>
      <div class="t-score" style="color:${c.light}" id="score-${i}">${t.score}</div>
      <div class="score-adj">
        <button onclick="adjustScore(${i},-100)">−</button>
        <button onclick="adjustScore(${i},100)">+</button>
      </div>
    `;
    card.querySelector('::before');
    // glow via inline style
    card.style.cssText += ``;
    // Set ::before via a style tag trick — use box-shadow instead
    if (i === activeIdx) card.style.boxShadow = `0 0 20px ${c.glow}, inset 0 0 30px ${c.glow}`;
    sb.appendChild(card);
  });
}

function refreshScoreboard() {
  teams.forEach((t, i) => {
    const card = document.getElementById(`card-${i}`);
    if (!card) return;
    const c = t.color;
    card.className = 'team-card' + (i === activeIdx ? ' active' : '');
    card.style.boxShadow = i === activeIdx ? `0 0 20px ${c.glow}, inset 0 0 30px ${c.glow}` : '';
    document.getElementById(`score-${i}`).textContent = t.score;
  });
}

function updateTurnIndicator() {
  if (!teams.length) return;
  document.getElementById('turn-indicator').textContent = `▶ ${teams[activeIdx].name.toUpperCase()}'S TURN`;
}

// ─── BOARD ───────────────────────────────────
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const h = document.createElement('div');
    h.className = 'cat-header'; h.textContent = cat.name;
    board.appendChild(h);
  });
  for (let row = 0; row < 5; row++) {
    CATEGORIES.forEach((cat, ci) => {
      const clue = cat.clues[row];
      const cell = document.createElement('div');
      cell.className = 'clue-cell';
      cell.id = `cell-${ci}-${row}`;
      cell.innerHTML = `<span class="val">${clue.pts}</span>`;
      cell.onclick = () => openClue(ci, row);
      board.appendChild(cell);
    });
  }
}

// ─── CLUE MODAL ──────────────────────────────
function openClue(ci, ri) {
  const cell = document.getElementById(`cell-${ci}-${ri}`);
  if (cell.classList.contains('used')) return;
  const clue = CATEGORIES[ci].clues[ri];
  currentClue = { ci, ri, pts: clue.pts, answer: clue.answer, isDailyDouble: !!clue.dailyDouble };

  document.getElementById('modal-cat').textContent = CATEGORIES[ci].name;
  document.getElementById('answer-wrap').classList.remove('show');
  document.getElementById('answer-text').textContent = clue.answer;

  if (clue.dailyDouble) {
    soundDailyDouble();
    document.getElementById('modal-points').textContent = 'DAILY DOUBLE!';
    document.getElementById('modal-clue').textContent = '';
    document.getElementById('wager-section').style.display = 'block';
    document.getElementById('wager-input').value = '';
    document.getElementById('timer-wrap').style.display = 'none';
    document.getElementById('team-buttons').innerHTML = '';
  } else {
    wagerAmount = clue.pts;
    document.getElementById('modal-points').textContent = clue.pts;
    document.getElementById('modal-clue').textContent = clue.clue;
    document.getElementById('wager-section').style.display = 'none';
    document.getElementById('timer-wrap').style.display = 'block';
    renderTeamButtons();
    startTimer();
  }
  document.getElementById('overlay').classList.add('show');
}

function confirmWager() {
  wagerAmount = Math.max(0, parseInt(document.getElementById('wager-input').value) || 0);
  const clue = CATEGORIES[currentClue.ci].clues[currentClue.ri];
  document.getElementById('modal-points').textContent = `Wager: ${wagerAmount}`;
  document.getElementById('modal-clue').textContent = clue.clue;
  document.getElementById('wager-section').style.display = 'none';
  document.getElementById('timer-wrap').style.display = 'block';
  renderTeamButtons();
  startTimer();
}

function renderTeamButtons() {
  const tb = document.getElementById('team-buttons');
  tb.innerHTML = '';
  teams.forEach((t, i) => {
    const c = t.color;
    const correct = document.createElement('button');
    correct.className = 'team-btn-correct';
    correct.style.background = c.bg;
    correct.textContent = `✓ ${t.name}`;
    correct.onclick = () => judgeAnswer(i, true);

    const wrong = document.createElement('button');
    wrong.className = 'team-btn-wrong';
    wrong.style.borderColor = c.bg;
    wrong.style.border = `1px solid ${c.bg}`;
    wrong.style.color = c.light;
    wrong.textContent = `✗ ${t.name}`;
    wrong.onclick = () => judgeAnswer(i, false);

    tb.appendChild(correct);
    tb.appendChild(wrong);
  });
}

function judgeAnswer(teamIdx, correct) {
  stopTimer();
  const pts = wagerAmount;
  if (correct) {
    soundCorrect();
    changeScore(teamIdx, pts);
    activeIdx = teamIdx;
    updateTurnIndicator();
  } else {
    soundWrong();
    changeScore(teamIdx, -pts);
  }
  revealAnswer();
  // Replace team buttons with just close
  document.getElementById('team-buttons').innerHTML = '';
  document.querySelector('.action-row').innerHTML = `<button class="btn btn-close" onclick="closeClue()">CLOSE</button>`;
}

function revealAnswer() { document.getElementById('answer-wrap').classList.add('show'); }

function skipClue() {
  stopTimer();
  revealAnswer();
  document.getElementById('team-buttons').innerHTML = '';
  document.querySelector('.action-row').innerHTML = `<button class="btn btn-close" onclick="closeClue()">CLOSE</button>`;
}

function closeClue() {
  stopTimer();
  document.getElementById(`cell-${currentClue.ci}-${currentClue.ri}`).classList.add('used');
  document.getElementById('overlay').classList.remove('show');
  // Restore action row for next clue
  document.querySelector('.action-row').innerHTML = `
    <button class="btn btn-reveal" onclick="revealAnswer()">Reveal Answer</button>
    <button class="btn btn-skip" onclick="skipClue()">Skip</button>
  `;
  if (!currentClue.isDailyDouble) {
    activeIdx = (activeIdx + 1) % teams.length;
    updateTurnIndicator();
  }
  refreshScoreboard();
}

// ─── TIMER ───────────────────────────────────
function startTimer() {
  timerSeconds = 60; updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    soundTimerTick(timerSeconds <= 10);
    if (timerSeconds <= 0) { stopTimer(); soundAlarm(); document.getElementById('timer-num').textContent = "TIME!"; }
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); timerInterval = null; }
function updateTimerDisplay() {
  const bar = document.getElementById('timer-bar');
  const num = document.getElementById('timer-num');
  bar.style.width = (timerSeconds / 60 * 100) + '%';
  num.textContent = timerSeconds;
  const d = timerSeconds <= 10;
  bar.classList.toggle('danger', d);
  num.classList.toggle('danger', d);
}

// ─── SCORE ───────────────────────────────────
function changeScore(idx, delta) {
  teams[idx].score += delta;
  document.getElementById(`score-${idx}`).textContent = teams[idx].score;
  showFlash(idx, delta);
}
function adjustScore(idx, delta) { changeScore(idx, delta); }
function showFlash(idx, delta) {
  const card = document.getElementById(`card-${idx}`);
  const el = document.createElement('div');
  el.className = 'score-flash ' + (delta > 0 ? 'pos' : 'neg');
  el.textContent = (delta > 0 ? '+' : '') + delta;
  card.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

// ─── SOUNDS ──────────────────────────────────
function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playTone(freq, dur, type='sine', gain=0.3, delay=0) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator(); const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    g.gain.setValueAtTime(0, ctx.currentTime + delay);
    g.gain.linearRampToValueAtTime(gain, ctx.currentTime + delay + 0.01);
    g.gain.linearRampToValueAtTime(0, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + dur + 0.05);
  } catch(e) {}
}
function soundCorrect() { playTone(523,.12); playTone(659,.12,'sine',.3,.13); playTone(784,.25,'sine',.3,.26); }
function soundWrong() { playTone(180,.4,'sawtooth',.25); }
function soundTimerTick(fast) { playTone(fast?880:660,.05,'square',.1); }
function soundAlarm() { for(let i=0;i<3;i++) playTone(440,.2,'sawtooth',.3,i*.25); }
function soundDailyDouble() { [523,659,784,1047].forEach((f,i)=>playTone(f,.2,'sine',.35,i*.18)); }

// ─── FINAL JEOPARDY ──────────────────────────
function launchFinal() {
  fjJudged = teams.map(() => false);
  document.getElementById('fj-cat-label').textContent = FINAL_JEOPARDY.category;
  document.getElementById('fj-clue-box').classList.remove('show');
  document.getElementById('fj-clue-box').textContent = '';
  document.getElementById('fj-answer-box').classList.remove('show');
  document.getElementById('fj-judge-grid').classList.remove('show');
  document.getElementById('fj-actions').style.display = 'none';
  document.getElementById('fj-finish-btn').style.display = 'none';
  document.getElementById('fj-step-wager').style.display = 'block';

  // Build wager inputs
  const wg = document.getElementById('fj-wager-grid');
  wg.innerHTML = '';
  teams.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'fj-wager-row';
    row.innerHTML = `
      <div class="fj-team-dot" style="background:${t.color.bg}"></div>
      <div class="fj-team-label" style="color:${t.color.light}">${t.name}</div>
      <div class="fj-team-score-label">Score: ${t.score}</div>
      <input class="fj-wager-input" type="number" id="fj-wager-${i}" placeholder="0" min="0">
    `;
    wg.appendChild(row);
  });

  document.getElementById('fj-overlay').classList.add('show');
}

function fjRevealClue() {
  document.getElementById('fj-step-wager').style.display = 'none';
  document.getElementById('fj-clue-box').textContent = FINAL_JEOPARDY.clue;
  document.getElementById('fj-clue-box').classList.add('show');

  // Build judge grid
  const jg = document.getElementById('fj-judge-grid');
  jg.innerHTML = '';
  teams.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'fj-judge-row';
    row.id = `fj-judge-row-${i}`;
    const wagerVal = Math.max(0, parseInt(document.getElementById(`fj-wager-${i}`)?.value) || 0);
    row.innerHTML = `
      <div class="fj-team-dot" style="background:${t.color.bg}"></div>
      <div class="fj-judge-name" style="color:${t.color.light}">${t.name}</div>
      <div class="fj-judge-wager">Wager: ${wagerVal}</div>
      <button class="fj-judge-btn" style="background:${t.color.bg};color:#fff" onclick="fjJudge(${i},true,${wagerVal})">✓ Correct</button>
      <button class="fj-judge-btn" style="background:rgba(255,255,255,0.06);color:${t.color.light};border:1px solid ${t.color.bg}" onclick="fjJudge(${i},false,${wagerVal})">✗ Wrong</button>
    `;
    jg.appendChild(row);
  });
  jg.classList.add('show');
  document.getElementById('fj-actions').style.display = 'flex';
}

function fjRevealAnswer() {
  document.getElementById('fj-answer-box').textContent = '✔ ' + FINAL_JEOPARDY.answer;
  document.getElementById('fj-answer-box').classList.add('show');
}

function fjJudge(idx, correct, wager) {
  const delta = correct ? wager : -wager;
  changeScore(idx, delta);
  if (correct) soundCorrect(); else soundWrong();
  const row = document.getElementById(`fj-judge-row-${idx}`);
  const btns = row.querySelectorAll('.fj-judge-btn');
  btns.forEach(b => b.remove());
  const res = document.createElement('div');
  res.className = 'fj-judge-result';
  res.style.color = correct ? 'var(--correct)' : 'var(--wrong)';
  res.textContent = (correct ? '✓ ' : '✗ ') + (delta > 0 ? '+' : '') + delta;
  row.appendChild(res);
  fjJudged[idx] = true;
  if (fjJudged.every(Boolean)) document.getElementById('fj-finish-btn').style.display = 'inline-block';
}

function fjFinish() {
  document.getElementById('fj-overlay').classList.remove('show');
  showWinner();
}

// ─── WINNER ──────────────────────────────────
function showWinner() {
  const sorted = [...teams].sort((a,b) => b.score - a.score);
  const topScore = sorted[0].score;
  const winners = sorted.filter(t => t.score === topScore);
  document.getElementById('winner-label').textContent = winners.length > 1 ? "IT'S A TIE!" : winners[0].name.toUpperCase() + " WINS!";

  const ws = document.getElementById('winner-scores');
  ws.innerHTML = '';
  sorted.forEach(t => {
    const card = document.createElement('div');
    card.className = 'winner-card';
    card.style.borderColor = t.color.bg;
    card.style.background = t.color.bg + '22';
    card.innerHTML = `<div class="wc-name" style="color:${t.color.light}">${t.name}</div><div class="wc-score" style="color:${t.color.light}">${t.score}</div>`;
    ws.appendChild(card);
  });
  document.getElementById('winner-overlay').classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const colors = teams.map(t => t.color.bg).concat(['#f5c518']);
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100+'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (2+Math.random()*3)+'s';
    el.style.animationDelay = (Math.random()*1.5)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5500);
  }
}
</script>
</body>
</html>
